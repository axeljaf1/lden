<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Huerto Hidropónico</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }
    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      flex: 1;
    }
    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 10px;
    }
    .on { background: #4CAF50; color: white; }
    .off { background: #f44336; color: white; }
  </style>
</head>
<body>

<h1>🌱 Huerto Hidropónico</h1>

<div class="cards">
  <div class="card">
    <h3>pH</h3>
    <p id="ph">--</p>
  </div>

  <div class="card">
    <h3>Temperatura °C</h3>
    <p id="temp">--</p>
  </div>

  <div class="card">
    <h3>Humedad %</h3>
    <p id="hum">--</p>
  </div>
</div>

<canvas id="chart" height="100"></canvas>

<div style="margin-top:20px;">
  <button class="on" onclick="encender()">Encender Bomba</button>
  <button class="off" onclick="apagar()">Apagar Bomba</button>
</div>

<script>
  const phEl = document.getElementById("ph");
  const tempEl = document.getElementById("temp");
  const humEl = document.getElementById("hum");

  const ctx = document.getElementById("chart").getContext("2d");

  const chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: [],
      datasets: [
        { label: "pH", data: [], borderWidth: 2 },
        { label: "Temp", data: [], borderWidth: 2 }
      ]
    },
    options: {
      responsive: true,
      scales: {
        y: { beginAtZero: false }
      }
    }
  });

  function getData() {
    return {
      ph: (5.5 + Math.random()).toFixed(2),
      temp: (20 + Math.random() * 5).toFixed(1),
      hum: (50 + Math.random() * 10).toFixed(1),
      time: new Date().toLocaleTimeString()
    };
  }

  function update() {
    const d = getData();

    phEl.textContent = d.ph;
    tempEl.textContent = d.temp;
    humEl.textContent = d.hum;

    chart.data.labels.push(d.time);
    chart.data.datasets[0].data.push(d.ph);
    chart.data.datasets[1].data.push(d.temp);

    if (chart.data.labels.length > 20) {
      chart.data.labels.shift();
      chart.data.datasets.forEach(ds => ds.data.shift());
    }

    chart.update();
  }

  setInterval(update, 2000);

  function encender() {
    alert("Bomba encendida");
  }

  function apagar() {
    alert("Bomba apagada");
  }
</script>

</body>
</html>
